<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phishing URL Scorer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #080808; --surface: #0d130d; --border: rgba(0,255,65,0.25); --border-strong: rgba(0,255,65,0.45);
    --green: #00FF41; --green-dim: #00b82f; --text: #d8ffe0; --text-muted: #6fae7a; --text-hint: #4a7a52;
    --amber: #FFC64B; --red: #FF4B4B; --radius: 8px; --radius-sm: 5px;
  }
  body { font-family: 'Courier New', ui-monospace, monospace; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 720px; margin: 0 auto; }
  .header { margin-bottom: 2rem; }
  .header h1 { font-size: 24px; font-weight: 700; color: var(--green); letter-spacing: 0.02em; text-shadow: 0 0 8px rgba(0,255,65,0.4); }
  .header p { font-size: 13px; color: var(--text-muted); margin-top: 6px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.5rem; }
  .section-label { font-size: 11px; font-weight: 700; color: var(--green-dim); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 1rem; }
  .field input {
    width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: var(--radius-sm);
    font-size: 14px; color: var(--text); background: #0a0f0a; outline: none; font-family: inherit;
  }
  .field input:focus { border-color: var(--green-dim); }
  .btn {
    width: 100%; padding: 12px; font-size: 13px; font-weight: 700; letter-spacing: 0.05em;
    background: var(--green); color: #061006; border: none; border-radius: var(--radius-sm);
    cursor: pointer; margin-top: 0.75rem; text-transform: uppercase;
  }
  .btn:hover { background: #33ff66; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .sample-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1rem; }
  .sample-btn {
    padding: 6px 10px; font-size: 10px; background: #0a0f0a; border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text-muted); cursor: pointer;
  }
  .sample-btn:hover { border-color: var(--green-dim); color: var(--green); }
  .hidden { display: none !important; }
  .result-score { text-align: center; padding: 1rem 0; }
  .result-score .num { font-size: 52px; font-weight: 700; color: var(--green); text-shadow: 0 0 10px rgba(0,255,65,0.5); }
  .result-score .sub { font-size: 11px; color: var(--text-muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
  .verdict-badge {
    display: inline-block; padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.05em; margin-top: 12px;
  }
  .verdict-badge.phishing { background: rgba(255,75,75,0.15); color: var(--red); border: 1px solid rgba(255,75,75,0.4); }
  .verdict-badge.suspicious { background: rgba(255,198,75,0.15); color: var(--amber); border: 1px solid rgba(255,198,75,0.4); }
  .verdict-badge.safe { background: rgba(0,255,65,0.15); color: var(--green); border: 1px solid rgba(0,255,65,0.4); }
  .subscore-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 1.25rem; }
  .subscore { background: #0a0f0a; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 4px; text-align: center; }
  .subscore .val { font-size: 18px; font-weight: 700; color: var(--green); }
  .subscore .lbl { font-size: 8px; color: var(--text-hint); text-transform: uppercase; margin-top: 3px; line-height: 1.3; }
  .notes-box {
    margin-top: 1.25rem; padding: 14px; background: #0a0f0a; border-left: 2px solid var(--green-dim);
    font-size: 13px; line-height: 1.6; color: var(--text);
  }
  .findings-list { margin-top: 1rem; }
  .finding-row { padding: 8px 0; border-bottom: 1px solid rgba(0,255,65,0.08); font-size: 12px; }
  .finding-row .fname { color: var(--text-muted); text-transform: uppercase; font-size: 10px; letter-spacing: 0.04em; }
  .finding-row .fdetail { color: var(--text); margin-top: 2px; }
  .spinner {
    display: inline-block; width: 12px; height: 12px; border: 2px solid rgba(0,255,65,0.2);
    border-top-color: var(--green); border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-box { color: var(--red); font-size: 12px; padding: 10px; border: 1px solid rgba(255,75,75,0.4); border-radius: var(--radius-sm); margin-top: 10px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>&gt; PHISHING URL SCORER</h1>
    <p>URL structure, domain age, SSL, Safe Browsing, and content analysis for link risk assessment.</p>
  </div>

  <div class="card">
    <div class="section-label">Try a sample URL</div>
    <div class="sample-grid" id="sample-grid"></div>

    <div class="section-label">Or check a URL</div>
    <div class="field"><input type="text" id="url-input" placeholder="https://example.com/login" /></div>
    <button class="btn" id="analyze-btn" onclick="analyzeUrl()">Check URL</button>
    <div id="error-wrap"></div>
  </div>

  <div class="card" id="result-card" style="display:none;">
    <div class="section-label">Result</div>
    <div id="result-wrap"></div>
  </div>
</div>

<script>
function loadSamples() {
  fetch('/samples')
    .then(res => res.json())
    .then(urls => {
      const grid = document.getElementById('sample-grid');
      grid.innerHTML = urls.map(u =>
        `<div class="sample-btn" onclick="runAnalysis('${u}')">${u.replace('https://','').replace('http://','').slice(0,30)}</div>`
      ).join('');
    });
}

function setLoading(loading) {
  const btn = document.getElementById('analyze-btn');
  btn.disabled = loading;
  btn.innerHTML = loading ? '<span class="spinner"></span>Analyzing...' : 'Check URL';
}

function analyzeUrl() {
  const url = document.getElementById('url-input').value.trim();
  if (!url) { showError('Please enter a URL.'); return; }
  runAnalysis(url);
}

function runAnalysis(url) {
  document.getElementById('url-input').value = url;
  setLoading(true);
  document.getElementById('error-wrap').innerHTML = '';
  fetch('/analyze', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ url: url })
  })
  .then(res => res.json())
  .then(data => {
    setLoading(false);
    if (data.error) { showError(data.error); return; }
    renderResult(data);
  })
  .catch(() => { setLoading(false); showError('Request failed. Please try again.'); });
}

function showError(msg) {
  document.getElementById('error-wrap').innerHTML = `<div class="error-box">${msg}</div>`;
}

function renderResult(data) {
  const r = data.result;
  document.getElementById('result-card').style.display = 'block';
  const wrap = document.getElementById('result-wrap');
  wrap.innerHTML = `
    <div class="result-score">
      <div class="num">${r.overall_score}</div>
      <div class="sub">Phishing risk score</div>
      <div class="verdict-badge ${r.verdict}">${r.verdict_label}</div>
    </div>
    <div class="subscore-grid">
      <div class="subscore"><div class="val">${r.structure_score}</div><div class="lbl">URL Structure</div></div>
      <div class="subscore"><div class="val">${r.age_result.score}</div><div class="lbl">Domain Age</div></div>
      <div class="subscore"><div class="val">${r.ssl_result.score}</div><div class="lbl">SSL</div></div>
      <div class="subscore"><div class="val">${r.content_result.score}</div><div class="lbl">Content</div></div>
    </div>
    <div class="notes-box">${data.explanation}</div>
    <div class="findings-list">
      <div class="finding-row"><div class="fname">Domain Age</div><div class="fdetail">${r.age_result.details}</div></div>
      <div class="finding-row"><div class="fname">SSL Certificate</div><div class="fdetail">${r.ssl_result.details}</div></div>
      <div class="finding-row"><div class="fname">Google Safe Browsing</div><div class="fdetail">${r.safe_browsing_result.details}</div></div>
      <div class="finding-row"><div class="fname">Page Content</div><div class="fdetail">${r.content_result.details}</div></div>
      <div class="finding-row"><div class="fname">URL Structure</div><div class="fdetail">${r.structure_reasons.join('; ')}</div></div>
    </div>
  `;
}

loadSamples();
</script>
</body>
</html>
